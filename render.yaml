services:
  - type: web
    name: portfolio-simulator-api
    runtime: java
    plan: free
    buildCommand: "./mvnw clean package -DskipTests"
    startCommand: "java -jar target/simulator-0.0.1-SNAPSHOT.jar"
    envVars:
      - key: PORT
        generateValue: false
      - key: SPRING_PROFILES_ACTIVE
        value: prod
