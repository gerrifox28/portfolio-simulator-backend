spring.application.name=portfolio-simulator

# Render sets a PORT env var — fall back to 8080 locally
server.port=${PORT:8080}

# Pretty-print JSON responses (helpful during development)
spring.jackson.serialization.indent-output=true

# File upload limits (spreadsheet uploads)
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Path where the uploaded spreadsheet is saved for persistence across restarts
app.data.path=./data/returns.xlsx
